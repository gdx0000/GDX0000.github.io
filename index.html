<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>给小马的小惊喜</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #000;
            overflow: hidden;
            cursor: crosshair;
            user-select: none;
            height: 100vh;
            width: 100vw;
        }
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 0;
        }
        .text-item {
            position: absolute;
            white-space: nowrap;
            pointer-events: none;
            z-index: 1;
            animation: floatUp var(--duration) ease-out forwards;
            text-shadow: 0 0 8px currentColor;
        }
        @keyframes floatUp {
            0% {
                opacity: 0;
                transform: translateY(0) scale(0.5) rotate(var(--rotate));
            }
            10% {
                opacity: 1;
                transform: translateY(-10px) scale(1) rotate(0deg);
            }
            80% {
                opacity: 0.6;
            }
            100% {
                opacity: 0;
                transform: translateY(-120vh) scale(0.8) rotate(var(--rotate-end));
            }
        }
        .click-burst {
            position: absolute;
            pointer-events: none;
            z-index: 2;
            animation: burst 1.5s ease-out forwards;
            font-weight: bold;
            text-shadow: 0 0 12px currentColor;
        }
        @keyframes burst {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(0.3);
            }
            40% {
                opacity: 1;
                transform: translate(var(--bx), var(--by)) scale(1.2);
            }
            100% {
                opacity: 0;
                transform: translate(calc(var(--bx) * 2.5), calc(var(--by) * 2.5)) scale(0.4);
            }
        }
    </style>
</head>
<body>
    <canvas id="particleCanvas"></canvas>
    <script>
        const canvas = document.getElementById("particleCanvas");
        const ctx = canvas.getContext("2d");

        let particles = [];
        const PARTICLE_COUNT = 150;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener("resize", resizeCanvas);

        class Particle {
            constructor() {
                this.reset(true);
            }
            reset(initial) {
                this.x = Math.random() * canvas.width;
                this.y = initial ? Math.random() * canvas.height : canvas.height + 5;
                this.size = Math.random() * 2.5 + 0.5;
                this.speedY = Math.random() * 0.4 + 0.15;
                this.speedX = (Math.random() - 0.5) * 0.3;
                this.opacity = Math.random() * 0.6 + 0.1;
                this.twinkleSpeed = Math.random() * 0.02 + 0.005;
                this.twinkleOffset = Math.random() * Math.PI * 2;
                this.hue = Math.random() < 0.5
                    ? 40 + Math.random() * 20
                    : 280 + Math.random() * 40;
                this.isHeart = Math.random() < 0.2;
            }
            update() {
                this.y -= this.speedY;
                this.x += this.speedX;
                if (this.y < -20 || this.x < -20 || this.x > canvas.width + 20) {
                    this.reset(false);
                }
                this.twinkleOffset += this.twinkleSpeed;
            }
            draw(ctx) {
                const alpha = this.opacity * (0.7 + 0.3 * Math.sin(this.twinkleOffset));
                ctx.fillStyle = `hsla(${this.hue}, 80%, 70%, ${alpha})`;

                if (this.isHeart) {
                    const s = this.size * 4;
                    const x = this.x;
                    const y = this.y;
                    ctx.beginPath();
                    ctx.moveTo(x, y + s * 0.3);
                    ctx.bezierCurveTo(x, y - s * 0.1, x - s, y - s * 0.1, x - s, y + s * 0.3);
                    ctx.bezierCurveTo(x - s, y + s * 0.7, x, y + s, x, y + s);
                    ctx.bezierCurveTo(x, y + s, x + s, y + s * 0.7, x + s, y + s * 0.3);
                    ctx.bezierCurveTo(x + s, y - s * 0.1, x, y - s * 0.1, x, y + s * 0.3);
                    ctx.fill();
                } else {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size * 2.5, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${this.hue}, 80%, 70%, ${alpha * 0.2})`;
                    ctx.fill();
                }
            }
        }

        for (let i = 0; i < PARTICLE_COUNT; i++) {
            particles.push(new Particle());
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (const p of particles) {
                p.update();
                p.draw(ctx);
            }
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        const texts = [
            "想你了", "每天都要元气满满", "保持微笑", "今天过得好开心",
            "记得吃水果", "期待下次见面", "多喝热水~", "早点休息",
            "好梦", "爱你哟", "照顾好自己", "想和你一起看电影",
            "你是我的唯一", "永远在一起", "喜欢你的一切", "要幸福呀",
            "别熬夜", "想牵你的手", "晚安", "早安",
            "你是最棒的", "今天也想见你", "心动了", "甜甜的",
            "有你在真好", "我的世界因你而亮", "想和你去海边",
            "最浪漫的事", "一起看星星", "抱抱", "我的宝藏", "命中注定",
            "见不到的日子，我更爱你",
            "我在这边，好好爱你",
            "早安宝贝，新的一天爱你",
            "清晨和夜晚，都归你",
            "我一直都在",
            "超级超级喜欢你！",
            "累了就休息，我陪着你",
            "好好吃饭",
            "抱抱你",
            "慢慢来，我一直陪你",
            "受委屈了就告诉我",
            "有我呢",
            "好想天天和你在一起",
            "不许离开我哦"
        ];

        const colors = [
            "#ff4d4f", "#fa8c16", "#fadb14", "#52c41a",
            "#1890ff", "#722ed1", "#eb2f96", "#ff85c0",
            "#ff9c6e", "#b37feb", "#69c0ff", "#ffc53d"
        ];

        const heartEmojis = ["💕", "💖", "💗", "💝", "💘", "💓", "✨", "💫", "🌙"];

        function createFloatingText(x, y) {
            const el = document.createElement("div");
            el.className = "text-item";
            el.innerText = texts[Math.floor(Math.random() * texts.length)];
            const color = colors[Math.floor(Math.random() * colors.length)];
            el.style.color = color;
            el.style.left = `${x}px`;
            el.style.top = `${y}px`;
            el.style.fontSize = `${16 + Math.random() * 14}px`;
            el.style.setProperty("--duration", `${3 + Math.random() * 4}s`);
            el.style.setProperty("--rotate", `${-20 + Math.random() * 40}deg`);
            el.style.setProperty("--rotate-end", `${-15 + Math.random() * 30}deg`);

            document.body.appendChild(el);
            el.addEventListener("animationend", () => el.remove());
        }

        function createHeartEmoji(x, y) {
            const el = document.createElement("div");
            el.className = "text-item";
            el.innerText = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
            el.style.color = colors[Math.floor(Math.random() * colors.length)];
            el.style.left = `${x}px`;
            el.style.top = `${y}px`;
            el.style.fontSize = `${20 + Math.random() * 20}px`;
            el.style.setProperty("--duration", `${4 + Math.random() * 5}s`);
            el.style.setProperty("--rotate", `${-30 + Math.random() * 60}deg`);
            el.style.setProperty("--rotate-end", `${-20 + Math.random() * 40}deg`);
            el.style.textShadow = "0 0 15px currentColor";

            document.body.appendChild(el);
            el.addEventListener("animationend", () => el.remove());
        }

        function spawnFromBottom() {
            const count = 2 + Math.floor(Math.random() * 3);
            for (let i = 0; i < count; i++) {
                const x = Math.random() * window.innerWidth * 0.9 + window.innerWidth * 0.05;
                const y = window.innerHeight + Math.random() * 30;
                createFloatingText(x, y);
            }
            if (Math.random() < 0.3) {
                const hx = Math.random() * window.innerWidth * 0.9 + window.innerWidth * 0.05;
                const hy = window.innerHeight + Math.random() * 30;
                createHeartEmoji(hx, hy);
            }
        }

        setInterval(spawnFromBottom, 300);

        for (let i = 0; i < 6; i++) {
            setTimeout(() => spawnFromBottom(), i * 150);
        }

        function burstAt(cx, cy) {
            const count = 10 + Math.floor(Math.random() * 8);
            for (let i = 0; i < count; i++) {
                const el = document.createElement("div");
                el.className = "click-burst";
                if (Math.random() < 0.25) {
                    el.innerText = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
                    el.style.fontSize = `${20 + Math.random() * 16}px`;
                } else {
                    el.innerText = texts[Math.floor(Math.random() * texts.length)];
                    el.style.fontSize = `${14 + Math.random() * 12}px`;
                }
                el.style.color = colors[Math.floor(Math.random() * colors.length)];
                el.style.left = `${cx}px`;
                el.style.top = `${cy}px`;

                const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.6;
                const dist = 60 + Math.random() * 120;
                el.style.setProperty("--bx", `${Math.cos(angle) * dist}px`);
                el.style.setProperty("--by", `${Math.sin(angle) * dist}px`);

                document.body.appendChild(el);
                el.addEventListener("animationend", () => el.remove());
            }
        }

        document.addEventListener("click", (e) => {
            burstAt(e.clientX, e.clientY);
        });

        document.addEventListener("touchstart", (e) => {
            for (const touch of e.changedTouches) {
                burstAt(touch.clientX, touch.clientY);
            }
        }, { passive: true });
    </script>
</body>
</html>
